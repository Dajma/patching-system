# patching-pipeline.yml
#
# Scheduled compliance pipeline — runs daily, assumes VMs already exist.
# Mirrors real-world practice: infrastructure is long-lived, the pipeline
# owns patch assessment and compliance reporting, not VM lifecycle.
#
# Schedule: daily at 06:00 UTC (adjust to your patch window)
# Manual:   workflow_dispatch (run on demand, e.g. after Patch Tuesday)
#
# Auth: OIDC — no long-lived credentials stored as secrets.
#   AWS:   role  arn:aws:iam::089523922997:role/github-actions-golden-image
#   Azure: app   aca1b62d-9868-4f66-956f-cd639c5515dc  (tenant 551ebe7c-…)
#   GCP:   WIF   projects/718362285643/…/github-pool/providers/github-provider
#
# Jobs:
#   1 · Patch Scan    — trigger assessments on all three clouds, wait for completion
#   2 · Compliance    — run compliance-report.py, post table to job summary,
#                       exit 1 if any VM is non-compliant (triggers alert email)

name: Patching Pipeline

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      cloud:
        description: "Which cloud(s) to scan"
        required: false
        default: all
        type: choice
        options: [all, aws, azure, gcp]

concurrency:
  group: patching-pipeline
  cancel-in-progress: false   # never interrupt a running scan

env:
  AWS_REGION:  us-east-1
  GCP_PROJECT: learn-image-project
  GCP_ZONE:    us-central1-a
  AZURE_RG:    patching-system-rg
  AZURE_SUB:   2f791c46-1726-4a0c-94e8-48314ac8f1b4

permissions:
  id-token: write
  contents: read

# ── 1 · Patch Scan ────────────────────────────────────────────────────────────
jobs:
  patch-scan:
    name: "1 · Patch Scan"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'aws' || github.event_name == 'schedule' }}
        with:
          role-to-assume: arn:aws:iam::089523922997:role/github-actions-golden-image
          aws-region: ${{ env.AWS_REGION }}

      - uses: azure/login@v2
        if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'azure' || github.event_name == 'schedule' }}
        with:
          client-id:       aca1b62d-9868-4f66-956f-cd639c5515dc
          tenant-id:       551ebe7c-477d-4607-b9a6-101ee365e775
          subscription-id: ${{ env.AZURE_SUB }}

      - uses: google-github-actions/auth@v2
        if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'gcp' || github.event_name == 'schedule' }}
        with:
          workload_identity_provider: projects/718362285643/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: golden-image-sa@learn-image-project.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2
        if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'gcp' || github.event_name == 'schedule' }}

      # ── AWS ────────────────────────────────────────────────────────────────
      - name: AWS — trigger SSM patch scan
        id: aws-scan
        if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'aws' || github.event_name == 'schedule' }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:Project,Values=patching-system" \
            --document-name AWS-RunPatchBaseline \
            --parameters '{"Operation":["Scan"]}' \
            --comment "Scheduled scan — ${{ github.run_id }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Command.CommandId" --output text 2>/dev/null || echo "")
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "AWS SSM scan: ${CMD_ID:-no targets found}"

      # ── Azure ──────────────────────────────────────────────────────────────
      - name: Azure — assess patches on all project VMs
        if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'azure' || github.event_name == 'schedule' }}
        run: |
          VMS=$(az vm list \
            --resource-group "${{ env.AZURE_RG }}" \
            --query "[?tags.Project=='patching-system'].name" \
            --output tsv 2>/dev/null || echo "")
          if [[ -z "$VMS" ]]; then
            echo "No project VMs found in ${{ env.AZURE_RG }}"
          else
            while IFS= read -r VM; do
              echo "Assessing $VM..."
              az vm assess-patches \
                --resource-group "${{ env.AZURE_RG }}" \
                --name "$VM" \
                --no-wait --output none 2>/dev/null || true
            done <<< "$VMS"
          fi

      # ── GCP ────────────────────────────────────────────────────────────────
      - name: GCP — dry-run patch scan
        id: gcp-scan
        if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'gcp' || github.event_name == 'schedule' }}
        run: |
          JOB=$(gcloud compute os-config patch-jobs execute \
            --project="${{ env.GCP_PROJECT }}" \
            --instance-filter-label-key=project \
            --instance-filter-label-values=patching-system \
            --dry-run \
            --format="value(name)" 2>/dev/null || echo "")
          echo "job=$JOB" >> "$GITHUB_OUTPUT"
          echo "GCP patch job: ${JOB:-no instances found}"

      # ── Wait ───────────────────────────────────────────────────────────────
      - name: Wait — AWS scan (up to 10 min)
        if: ${{ steps.aws-scan.outputs.cmd_id != '' }}
        run: |
          CMD_ID="${{ steps.aws-scan.outputs.cmd_id }}"
          for i in $(seq 1 30); do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$CMD_ID" \
              --query "CommandInvocations[].Status" \
              --output text --region "${{ env.AWS_REGION }}" 2>/dev/null || echo Pending)
            echo "  [$i/30] $STATUS"
            echo "$STATUS" | grep -qvE "InProgress|Pending|Delayed" && break
            [[ "$i" -eq 30 ]] && echo "WARNING: scan timed out — continuing to report"
            sleep 20
          done
          aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --query "CommandInvocations[].{Instance:InstanceId,Status:Status}" \
            --output table --region "${{ env.AWS_REGION }}" 2>/dev/null || true

      - name: Wait — GCP scan (up to 10 min)
        if: ${{ steps.gcp-scan.outputs.job != '' }}
        run: |
          JOB="${{ steps.gcp-scan.outputs.job }}"
          for i in $(seq 1 30); do
            STATE=$(gcloud compute os-config patch-jobs describe "$JOB" \
              --project="${{ env.GCP_PROJECT }}" \
              --format="value(state)" 2>/dev/null || echo UNKNOWN)
            echo "  [$i/30] $STATE"
            [[ "$STATE" =~ ^(SUCCEEDED|COMPLETED_WITH_ERRORS|FAILED)$ ]] && break
            [[ "$i" -eq 30 ]] && echo "WARNING: GCP scan timed out — continuing to report"
            sleep 20
          done

      # Azure assess-patches runs async; give it 2 min to populate instance view
      - name: Wait — Azure assessment settle time
        if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'azure' || github.event_name == 'schedule' }}
        run: sleep 120

# ── 2 · Compliance Report ─────────────────────────────────────────────────────
  compliance-report:
    name: "2 · Compliance Report"
    runs-on: ubuntu-latest
    needs: patch-scan

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::089523922997:role/github-actions-golden-image
          aws-region: ${{ env.AWS_REGION }}

      - uses: azure/login@v2
        with:
          client-id:       aca1b62d-9868-4f66-956f-cd639c5515dc
          tenant-id:       551ebe7c-477d-4607-b9a6-101ee365e775
          subscription-id: ${{ env.AZURE_SUB }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/718362285643/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: golden-image-sa@learn-image-project.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Run compliance report
        run: |
          python3 scripts/compliance-report.py 2>&1 | tee /tmp/report.txt
          python3 scripts/compliance-report.py --json 2>/dev/null > /tmp/report.json \
            || echo "[]" > /tmp/report.json

      - name: Post to job summary
        if: always()
        run: |
          {
            echo "## ☁️ Patch Compliance Report"
            echo ""
            echo "\`\`\`"
            cat /tmp/report.txt
            echo "\`\`\`"
            echo ""
            echo "_Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · $(date -u '+%Y-%m-%d %H:%M UTC')_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if non-compliant
        run: |
          python3 - << 'EOF'
          import json, sys
          with open("/tmp/report.json") as f:
              rows = json.load(f)
          bad = [r for r in rows
                 if any(x in r["status"].upper() for x in ("NON_COMPLIANT", "FAILED", "ERROR"))]
          if bad:
              print(f"FAIL: {len(bad)} non-compliant VM(s):")
              for r in bad:
                  print(f"  {r['cloud']} / {r['vm']} — {r['status']} ({r['missing']} missing patches)")
              sys.exit(1)
          if not rows:
              print("WARNING: no VMs found — are the test VMs running?")
              sys.exit(1)
          print(f"OK: all {len(rows)} VMs compliant")
          EOF
